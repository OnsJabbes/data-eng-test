name: CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v4
        with:
          repository: OnsJabbes/data-eng-test
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: OnsJabbes/terraform-data-eng-test-9b7ba3dd
          token: ${{ secrets.GH_TOKEN }}
          path: terraform

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/infra
        run: |
          terraform init -input=false
          _cb=$(python3 -c "import json; d=json.load(open('.terraform/terraform.tfstate')); print(d.get('backend',{}).get('config',{}).get('bucket',''))" 2>/dev/null) || true
          if [[ -n "$_cb" && "$_cb" != None ]]; then echo "CONFIG_BUCKET=$_cb" >> $GITHUB_ENV; fi

      - name: Get Terraform Outputs
        working-directory: terraform/infra
        run: |
          _sb_1=$(terraform output -raw scripts_bucket_name 2>/dev/null) || true
          if [[ -z "$_sb_1" || "$_sb_1" == ::* || "$_sb_1" == None ]]; then _sb_1="$CONFIG_BUCKET"; fi
          _glue_job_1=$(terraform output -raw glue_job_1_name 2>/dev/null) || true
          if [[ -z "$_glue_job_1" || "$_glue_job_1" == ::* || "$_glue_job_1" == None ]]; then
            _glue_job_1=$(terraform output -raw glue_job_1_name 2>/dev/null) || true
          fi
          if [[ -z "$_glue_job_1" || "$_glue_job_1" == ::* || "$_glue_job_1" == None ]]; then
            _deploy_suffix=$(echo "$CONFIG_BUCKET" | rev | cut -d'-' -f1 | rev)
            _glue_job_1=$(aws glue list-jobs --output json 2>/dev/null | python3 -c "import json,sys; jobs=json.load(sys.stdin).get('JobNames',[]); sfx='$_deploy_suffix'; matched=[j for j in jobs if sfx and sfx in j]; matched.sort(); print(matched[0] if 0<len(matched) else '')" 2>/dev/null) || true
          fi
          echo "GLUE_JOB_1=$_glue_job_1" >> $GITHUB_ENV
          _sk_1=$(terraform output -raw glue_test_script_1_s3_uri 2>/dev/null) || true
          if [[ -z "$_sk_1" || "$_sk_1" == ::* || "$_sk_1" == None ]]; then
            _sk_1=$(aws glue get-job --job-name "$_glue_job_1" --query Job.Command.ScriptLocation --output text 2>/dev/null) || true
          fi
          if [[ -z "$_sk_1" || "$_sk_1" == ::* || "$_sk_1" == None ]]; then _sk_1="s3://$_sb_1/scripts/etl_api_to_csv_products.py"; fi
          echo "S3_KEY_1=$_sk_1" >> $GITHUB_ENV
          echo "S3_BUCKET_1=$_sb_1" >> $GITHUB_ENV


      - name: Build S3 path
        run: |
          echo "S3_PATH_1=$S3_KEY_1" >> $GITHUB_ENV


      - name: Build Glue dependencies
        run: |
          mkdir -p req
          pip install -r requirements.txt 'urllib3<2' -t req/ \
            --no-binary psycopg2-binary

      - name: Zip des libs
        run: |
          cd req
          zip -r ../dependencies.zip .

      - name: Upload dependencies to S3
        run: |
          aws s3 cp dependencies.zip s3://$CONFIG_BUCKET/dependencies.zip

      - name: Debug S3 path
        run: |
          echo "BUCKET=$S3_BUCKET_1"
          echo "KEY=$S3_KEY_1"
          echo "FULL=$S3_PATH_1"


      - name: Replace Glue script in S3
        run: |
          aws s3 cp src/jobs/etl_api_to_csv_products.py $S3_PATH_1

      # ─────────────────────────────
      # 9b. Upload config.json — keys auto-detected from scripts: ['API_URL', 'OUTPUT_BUCKET_NAME', 'OUTPUT_FILE_NAME', 'OUTPUT_PREFIX']
      # ─────────────────────────────
      - name: Upload config.json to S3
        working-directory: terraform/infra
        run: |
          _tf_api_url=$(terraform output -raw api_url 2>/dev/null) || true; if [[ -z "$_tf_api_url" || "$_tf_api_url" == ::* ]]; then API_URL='https://dummyjson.com/products?limit=0'; else API_URL="$_tf_api_url"; fi
          _tf_ob=$(terraform output -raw data_bucket_name 2>/dev/null) || true; if [[ -z "$_tf_ob" || "$_tf_ob" == ::* ]]; then _tf_ob=$(terraform output -raw output_bucket 2>/dev/null) || true; fi; if [[ -z "$_tf_ob" || "$_tf_ob" == ::* ]]; then _tf_ob=''; fi; OUTPUT_BUCKET="$_tf_ob"
          _tf_host=$(terraform output -raw rds_address 2>/dev/null) || true; if [[ -z "$_tf_host" || "$_tf_host" == ::* ]]; then _tf_host=$(terraform output -raw rds_endpoint 2>/dev/null) || true; fi; if [[ -z "$_tf_host" || "$_tf_host" == ::* ]]; then _tf_host=$(aws rds describe-db-instances --query 'DBInstances[?DBInstanceStatus==`available`] | sort_by(@, &InstanceCreateTime)[-1].Endpoint.Address' --output text 2>/dev/null) || true; fi; if [[ "$_tf_host" == "None" || "$_tf_host" == ::* ]]; then _tf_host=''; fi; DB_HOST="$_tf_host"
          _tf_dbname=$(terraform output -raw rds_db_name 2>/dev/null) || true; if [[ -z "$_tf_dbname" || "$_tf_dbname" == ::* ]]; then _tf_dbname=$(terraform output -raw db_name 2>/dev/null) || true; fi; if [[ -z "$_tf_dbname" || "$_tf_dbname" == ::* ]]; then _tf_dbname=$(aws rds describe-db-instances --query 'DBInstances[?DBInstanceStatus==`available`] | sort_by(@, &InstanceCreateTime)[-1].DBName' --output text 2>/dev/null) || true; fi; if [[ "$_tf_dbname" == "None" || "$_tf_dbname" == ::* ]]; then _tf_dbname=''; fi; DB_NAME="$_tf_dbname"
          _tf_user=$(terraform output -raw rds_username 2>/dev/null) || true; if [[ -z "$_tf_user" || "$_tf_user" == ::* ]]; then _tf_user=$(terraform output -raw db_username 2>/dev/null) || true; fi; if [[ -z "$_tf_user" || "$_tf_user" == ::* ]]; then _tf_user=$(aws rds describe-db-instances --query 'DBInstances[?DBInstanceStatus==`available`] | sort_by(@, &InstanceCreateTime)[-1].MasterUsername' --output text 2>/dev/null) || true; fi; if [[ "$_tf_user" == "None" || "$_tf_user" == ::* ]]; then _tf_user=''; fi; DB_USER="$_tf_user"
          _tf_pass=$(terraform output -raw rds_password 2>/dev/null) || true; if [[ -z "$_tf_pass" || "$_tf_pass" == ::* ]]; then _tf_pass=$(terraform output -raw db_password 2>/dev/null) || true; fi; if [[ -z "$_tf_pass" || "$_tf_pass" == ::* ]]; then _tf_pass=$(terraform show -json 2>/dev/null | python3 -c "import json,sys\ntry:\n  data=json.load(sys.stdin)\n  [print(r.get('values',{}).get('password','')) for r in data.get('values',{}).get('root_module',{}).get('resources',[]) if r.get('type')=='aws_db_instance']\nexcept: pass" 2>/dev/null | head -1) || true; fi; if [[ "$_tf_pass" == "None" || "$_tf_pass" == ::* ]]; then _tf_pass=''; fi; DB_PASS="$_tf_pass"
          export API_URL OUTPUT_BUCKET DB_HOST DB_NAME DB_USER DB_PASS
          python3 -c "import json,os; cfg={'API_URL':os.getenv('API_URL',''),'OUTPUT_BUCKET_NAME':os.getenv('OUTPUT_BUCKET',''),'OUTPUT_FILE_NAME':'catalog.csv','OUTPUT_PREFIX':'products/processed'}; open('config.json','w').write(json.dumps(cfg,indent=2)); safe=dict(cfg); [safe.update({k:'***'}) for k in safe if 'PASS' in k or 'PASSWORD' in k]; print('config.json:',json.dumps(safe,indent=2))"
          aws s3 cp config.json s3://$CONFIG_BUCKET/config.json
          echo '✅ config.json uploaded to S3'

      # ─────────────────────────────
      # 9c. Disable RDS force_ssl — fully autonomous, no manual intervention needed
      # ─────────────────────────────
      - name: Disable RDS force_ssl
        working-directory: terraform/infra
        run: |
          _RDS_ID=$(terraform output -raw rds_instance_id 2>/dev/null) || true
          if [[ -z "$_RDS_ID" || "$_RDS_ID" == ::* ]]; then
            _RDS_ID=$(aws rds describe-db-instances --query 'DBInstances[?DBInstanceStatus==`available`].[DBInstanceIdentifier]' --output text 2>/dev/null | head -1)
          fi
          if [[ -n "$_RDS_ID" ]]; then
            echo "Configuring RDS: $_RDS_ID"
            aws rds create-db-parameter-group --db-parameter-group-name cd-no-ssl-pg --db-parameter-group-family postgres16 --description 'CD auto: disable force_ssl' 2>/dev/null || true
            aws rds modify-db-parameter-group --db-parameter-group-name cd-no-ssl-pg --parameters 'ParameterName=rds.force_ssl,ParameterValue=0,ApplyMethod=immediate' 2>/dev/null || true
            _CURRENT_PG=$(aws rds describe-db-instances --db-instance-identifier "$_RDS_ID" --query 'DBInstances[0].DBParameterGroups[0].DBParameterGroupName' --output text 2>/dev/null) || true
            if [[ "$_CURRENT_PG" != 'cd-no-ssl-pg' ]]; then
              aws rds modify-db-instance --db-instance-identifier "$_RDS_ID" --db-parameter-group-name cd-no-ssl-pg --apply-immediately 2>/dev/null || true
              aws rds reboot-db-instance --db-instance-identifier "$_RDS_ID" 2>/dev/null || true
              echo 'Waiting for RDS reboot...'
              aws rds wait db-instance-available --db-instance-identifier "$_RDS_ID" 2>/dev/null || sleep 90
            else
              echo 'force_ssl already disabled — skipping reboot'
            fi
            echo '✅ RDS force_ssl disabled'
          else
            echo '[WARN] Could not determine RDS instance ID — skipping'
          fi
      # ─────────────────────────────
      # 10. Trigger Glue Jobs + capturer les Run IDs
      # FIX: on récupère les RUN_ID pour que le smoke test surveille
      #      ces runs précis, sans relancer les jobs une 2ème fois
      # ─────────────────────────────
      - name: Trigger Glue Jobs
        run: |
          CONFIG_PATH="s3://${CONFIG_BUCKET}/config.json"
          DEPS_PATH="s3://${CONFIG_BUCKET}/dependencies.zip"

          # Try to get API_URL from Terraform outputs (used by job 1 to call the source API)
          _tf_tmp=$(terraform -chdir=terraform/infra output -raw api_url 2>/dev/null) || true; if [[ -z "$_tf_tmp" || "$_tf_tmp" == ::* ]]; then _tf_tmp=$(terraform -chdir=terraform/infra output -raw API_URL 2>/dev/null) || true; fi; if [[ "$_tf_tmp" == ::* ]]; then _tf_tmp=''; fi; _TF_API_URL="$_tf_tmp"

          _D1=$(aws glue get-job --job-name "$GLUE_JOB_1" --query Job.DefaultArguments --output json 2>/dev/null || echo '{}')
          _A1=$(echo "$_D1" | jq -c --arg cp "$CONFIG_PATH" --arg dp "$DEPS_PATH" --arg au "$_TF_API_URL" '(. // {}) + {"--CONFIG_PATH": $cp, "--extra-py-files": $dp} + (if ($au | length) > 0 then {"--API_URL": $au} else {} end)')
          RUN1=$(aws glue start-job-run --job-name "$GLUE_JOB_1" --arguments "$_A1" --query JobRunId --output text)
          echo "RUN_ID_1=$RUN1" >> $GITHUB_ENV

          echo "Jobs lancés : $RUN1"

      # ─────────────────────────────
      # 11. SMOKE TEST
      # FIX 1: surveille les runs existants (RUN_ID) → plus de double lancement
      # FIX 2: polling en parallèle (background) → tous les jobs checkés en même temps
      # ─────────────────────────────
      - name: Smoke Test - Validate Glue Jobs
        run: |
          set -euo pipefail

          MAX_RETRIES=25
          SLEEP_TIME=25

          # Surveille un run déjà lancé (RUN_ID passé en argument)
          # FIX : prend JOB_NAME + RUN_ID existant, ne relance PAS le job
          watch_run() {
            local JOB_NAME=$1
            local RUN_ID=$2

            echo "▶ Watching [$JOB_NAME] run: $RUN_ID"

            local STATUS="STARTING"
            local COUNT=0

            while [[ "$STATUS" == "STARTING" || "$STATUS" == "RUNNING" ]]; do
              STATUS=$(aws glue get-job-run \
                --job-name "$JOB_NAME" \
                --run-id "$RUN_ID" \
                --query 'JobRun.JobRunState' \
                --output text)

              echo "  [$JOB_NAME] → $STATUS"

              COUNT=$((COUNT + 1))
              if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
                echo "❌ TIMEOUT: $JOB_NAME ($RUN_ID)"
                return 1
              fi

              sleep "$SLEEP_TIME"
            done

            if [ "$STATUS" != "SUCCEEDED" ]; then
              echo "❌ FAILED: $JOB_NAME ($RUN_ID) — état final: $STATUS"
              return 1
            fi

            echo "✅ PASSED: $JOB_NAME"
            return 0
          }

          watch_run "$GLUE_JOB_1" "$RUN_ID_1" &

          # Attendre tous les processus et échouer si l'un d'eux échoue
          FAILED=0
          for pid in $(jobs -p); do
            wait "$pid" || FAILED=1
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ Un ou plusieurs jobs Glue ont échoué."
            exit 1
          fi

          echo ""
          echo "✅ Tous les smoke tests sont passés."
