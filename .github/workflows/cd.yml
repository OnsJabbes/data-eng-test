name: CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v4
        with:
          repository: OnsJabbes/data-eng-test
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: OnsJabbes/terraform-An-end-to-end-data-engineering-pipeline-d2ecea41
          token: ${{ secrets.GH_TOKEN }}
          path: terraform

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/infra
        run: |
          terraform init -input=false

      - name: Get Terraform Outputs
        working-directory: terraform/infra
        run: |
          echo "S3_BUCKET_1=$(terraform output -raw glue_scripts_bucket_name)" >> $GITHUB_ENV
          echo "S3_KEY_1=$(terraform output -raw glue_job_1_script_s3_uri)" >> $GITHUB_ENV
          echo "GLUE_JOB_1=$(terraform output -raw glue_job_1_name)" >> $GITHUB_ENV

          echo "S3_BUCKET_2=$(terraform output -raw glue_scripts_bucket_name)" >> $GITHUB_ENV
          echo "S3_KEY_2=$(terraform output -raw glue_job_2_script_s3_uri)" >> $GITHUB_ENV
          echo "GLUE_JOB_2=$(terraform output -raw glue_job_2_name)" >> $GITHUB_ENV

          echo "S3_BUCKET_3=$(terraform output -raw glue_scripts_bucket_name)" >> $GITHUB_ENV
          echo "S3_KEY_3=$(terraform output -raw glue_job_3_script_s3_uri)" >> $GITHUB_ENV
          echo "GLUE_JOB_3=$(terraform output -raw glue_job_3_name)" >> $GITHUB_ENV


      - name: Build S3 path
        run: |
          echo "S3_PATH_1=$S3_KEY_1" >> $GITHUB_ENV

          echo "S3_PATH_2=$S3_KEY_2" >> $GITHUB_ENV

          echo "S3_PATH_3=$S3_KEY_3" >> $GITHUB_ENV


      - name: Build Glue dependencies
        run: |
          mkdir -p req
          pip install -r requirements.txt 'urllib3<2' -t req/ \
            --no-binary psycopg2-binary

      - name: Zip des libs
        run: |
          cd req
          zip -r ../dependencies.zip .

      - name: Upload dependencies to S3
        run: |
          aws s3 cp dependencies.zip s3://tfstate-an-end-to-end-data-engineering-pipeline-t9lko943/dependencies.zip

      - name: Debug S3 path
        run: |
          echo "BUCKET=$S3_BUCKET_1"
          echo "KEY=$S3_KEY_1"
          echo "FULL=$S3_PATH_1"


      - name: Replace Glue script in S3
        run: |
          aws s3 cp src/jobs/etl_api_to_csv_products.py $S3_PATH_1
          aws s3 cp src/jobs/etl_csv_to_rds.py $S3_PATH_2
          aws s3 cp src/jobs/etl_sales.py $S3_PATH_3

      # ─────────────────────────────
      # 9b. Upload config.json — combined config for ALL Glue jobs
      #   job1 reads: API_URL, OUTPUT_BUCKET_NAME, OUTPUT_PREFIX, OUTPUT_FILE_NAME
      #   job2/3 read: host, dbname, user, password, port
      # ─────────────────────────────
      - name: Upload config.json to S3
        working-directory: terraform/infra
        run: |
          CONFIG_BUCKET="tfstate-an-end-to-end-data-engineering-pipeline-t9lko943"
          API_URL=$(terraform output -raw api_url 2>/dev/null || echo 'https://dummyjson.com/products?limit=0')
          OUTPUT_BUCKET=$(terraform output -raw data_bucket_name 2>/dev/null || terraform output -raw output_bucket 2>/dev/null || terraform output -raw staging_bucket 2>/dev/null || echo '')
          DB_HOST=$(terraform output -raw rds_address 2>/dev/null || terraform output -raw rds_endpoint 2>/dev/null || terraform output -raw db_endpoint 2>/dev/null || echo '')
          DB_NAME=$(terraform output -raw rds_db_name 2>/dev/null || terraform output -raw db_name 2>/dev/null || echo '')
          DB_USER=$(terraform output -raw rds_username 2>/dev/null || terraform output -raw db_username 2>/dev/null || echo '')
          DB_PASS=$(terraform output -raw rds_password 2>/dev/null || terraform output -raw db_password 2>/dev/null || echo '')
          export API_URL OUTPUT_BUCKET DB_HOST DB_NAME DB_USER DB_PASS
          python3 -c "import json,os; cfg={'API_URL':os.getenv('API_URL',''),'OUTPUT_BUCKET_NAME':os.getenv('OUTPUT_BUCKET',''),'OUTPUT_PREFIX':'products/processed','OUTPUT_FILE_NAME':'catalog.csv','host':os.getenv('DB_HOST',''),'dbname':os.getenv('DB_NAME',''),'user':os.getenv('DB_USER',''),'password':os.getenv('DB_PASS',''),'port':'5432'}; open('config.json','w').write(json.dumps(cfg,indent=2)); safe=dict(cfg); safe['password']='***'; print('config.json:',json.dumps(safe,indent=2))"
          aws s3 cp config.json s3://$CONFIG_BUCKET/config.json
          echo '✅ config.json uploaded to S3'

      # ─────────────────────────────
      # 10. Trigger Glue Jobs + capturer les Run IDs
      # FIX: on récupère les RUN_ID pour que le smoke test surveille
      #      ces runs précis, sans relancer les jobs une 2ème fois
      # ─────────────────────────────
      - name: Trigger Glue Jobs
        run: |
          CONFIG_BUCKET="tfstate-an-end-to-end-data-engineering-pipeline-t9lko943"
          CONFIG_PATH="s3://${CONFIG_BUCKET}/config.json"
          DEPS_PATH="s3://${CONFIG_BUCKET}/dependencies.zip"

          # Try to get API_URL from Terraform outputs (used by job 1 to call the source API)
          _TF_API_URL=$(terraform -chdir=terraform/infra output -raw api_url 2>/dev/null || terraform -chdir=terraform/infra output -raw API_URL 2>/dev/null || echo '')

          _D1=$(aws glue get-job --job-name "$GLUE_JOB_1" --query Job.DefaultArguments --output json 2>/dev/null || echo '{}')
          _A1=$(echo "$_D1" | jq -c --arg cp "$CONFIG_PATH" --arg dp "$DEPS_PATH" --arg au "$_TF_API_URL" '(. // {}) + {"--CONFIG_PATH": $cp, "--extra-py-files": $dp} + (if ($au | length) > 0 then {"--API_URL": $au} else {} end)')
          RUN1=$(aws glue start-job-run --job-name "$GLUE_JOB_1" --arguments "$_A1" --query JobRunId --output text)
          echo "RUN_ID_1=$RUN1" >> $GITHUB_ENV
          echo "⏳ Waiting for Job 1 [$GLUE_JOB_1] before launching Job 2..."
          _W_STATUS="STARTING"
          _W_TRIES=0
          while [[ "$_W_STATUS" == "STARTING" || "$_W_STATUS" == "RUNNING" ]]; do
            sleep 30
            _W_STATUS=$(aws glue get-job-run --job-name "$GLUE_JOB_1" --run-id "$RUN1" --query JobRun.JobRunState --output text)
            echo "  [Job 1] → $_W_STATUS"
            _W_TRIES=$(( _W_TRIES + 1 ))
            [ "$_W_TRIES" -lt 60 ] || { echo "❌ Timeout waiting for Job 1"; exit 1; }
          done
          [ "$_W_STATUS" = "SUCCEEDED" ] || { echo "❌ Job 1 failed: $_W_STATUS"; exit 1; }
          echo "✅ Job 1 done — launching Job 2"

          _D2=$(aws glue get-job --job-name "$GLUE_JOB_2" --query Job.DefaultArguments --output json 2>/dev/null || echo '{}')
          _A2=$(echo "$_D2" | jq -c --arg cp "$CONFIG_PATH" --arg dp "$DEPS_PATH" --arg au "$_TF_API_URL" '(. // {}) + {"--CONFIG_PATH": $cp, "--extra-py-files": $dp} + (if ($au | length) > 0 then {"--API_URL": $au} else {} end)')
          RUN2=$(aws glue start-job-run --job-name "$GLUE_JOB_2" --arguments "$_A2" --query JobRunId --output text)
          echo "RUN_ID_2=$RUN2" >> $GITHUB_ENV
          echo "⏳ Waiting for Job 2 [$GLUE_JOB_2] before launching Job 3..."
          _W_STATUS="STARTING"
          _W_TRIES=0
          while [[ "$_W_STATUS" == "STARTING" || "$_W_STATUS" == "RUNNING" ]]; do
            sleep 30
            _W_STATUS=$(aws glue get-job-run --job-name "$GLUE_JOB_2" --run-id "$RUN2" --query JobRun.JobRunState --output text)
            echo "  [Job 2] → $_W_STATUS"
            _W_TRIES=$(( _W_TRIES + 1 ))
            [ "$_W_TRIES" -lt 60 ] || { echo "❌ Timeout waiting for Job 2"; exit 1; }
          done
          [ "$_W_STATUS" = "SUCCEEDED" ] || { echo "❌ Job 2 failed: $_W_STATUS"; exit 1; }
          echo "✅ Job 2 done — launching Job 3"

          _D3=$(aws glue get-job --job-name "$GLUE_JOB_3" --query Job.DefaultArguments --output json 2>/dev/null || echo '{}')
          _A3=$(echo "$_D3" | jq -c --arg cp "$CONFIG_PATH" --arg dp "$DEPS_PATH" --arg au "$_TF_API_URL" '(. // {}) + {"--CONFIG_PATH": $cp, "--extra-py-files": $dp} + (if ($au | length) > 0 then {"--API_URL": $au} else {} end)')
          RUN3=$(aws glue start-job-run --job-name "$GLUE_JOB_3" --arguments "$_A3" --query JobRunId --output text)
          echo "RUN_ID_3=$RUN3" >> $GITHUB_ENV

          echo "Jobs lancés : $RUN1 | $RUN2 | $RUN3"

      # ─────────────────────────────
      # 11. SMOKE TEST
      # FIX 1: surveille les runs existants (RUN_ID) → plus de double lancement
      # FIX 2: polling en parallèle (background) → tous les jobs checkés en même temps
      # ─────────────────────────────
      - name: Smoke Test - Validate Glue Jobs
        run: |
          set -euo pipefail

          MAX_RETRIES=25
          SLEEP_TIME=25

          # Surveille un run déjà lancé (RUN_ID passé en argument)
          # FIX : prend JOB_NAME + RUN_ID existant, ne relance PAS le job
          watch_run() {
            local JOB_NAME=$1
            local RUN_ID=$2

            echo "▶ Watching [$JOB_NAME] run: $RUN_ID"

            local STATUS="STARTING"
            local COUNT=0

            while [[ "$STATUS" == "STARTING" || "$STATUS" == "RUNNING" ]]; do
              STATUS=$(aws glue get-job-run \
                --job-name "$JOB_NAME" \
                --run-id "$RUN_ID" \
                --query 'JobRun.JobRunState' \
                --output text)

              echo "  [$JOB_NAME] → $STATUS"

              COUNT=$((COUNT + 1))
              if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
                echo "❌ TIMEOUT: $JOB_NAME ($RUN_ID)"
                return 1
              fi

              sleep "$SLEEP_TIME"
            done

            if [ "$STATUS" != "SUCCEEDED" ]; then
              echo "❌ FAILED: $JOB_NAME ($RUN_ID) — état final: $STATUS"
              return 1
            fi

            echo "✅ PASSED: $JOB_NAME"
            return 0
          }

          watch_run "$GLUE_JOB_1" "$RUN_ID_1" &
          watch_run "$GLUE_JOB_2" "$RUN_ID_2" &
          watch_run "$GLUE_JOB_3" "$RUN_ID_3" &

          # Attendre tous les processus et échouer si l'un d'eux échoue
          FAILED=0
          for pid in $(jobs -p); do
            wait "$pid" || FAILED=1
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ Un ou plusieurs jobs Glue ont échoué."
            exit 1
          fi

          echo ""
          echo "✅ Tous les smoke tests sont passés."
